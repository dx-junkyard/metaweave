# CI: Backend unit tests (pytest)
# -----------------------------------------------------------
# 将来的に lint (flake8, mypy) やフロントエンドテストを追加する場合は
# jobs セクションに新しいジョブを追加してください。
# -----------------------------------------------------------

name: Backend Tests

on:
  pull_request:
    branches: [main, master]

jobs:
  # ---------------------------------------------------------
  # Backend pytest
  # ---------------------------------------------------------
  backend-test:
    runs-on: ubuntu-latest

    # テスト実行に必要なダミー環境変数
    # 実際の API 通信はモックされるため、本物のキーは不要
    env:
      OPENAI_API_KEY: "test-dummy-key"
      JWT_SECRET: "test-dummy-secret"

    steps:
      # 1. リポジトリのチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Python 環境のセットアップ
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      # 3. 依存関係のインストール
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      # 4. テストの実行
      - name: Run pytest
        run: |
          cd backend && pytest tests/ -v

