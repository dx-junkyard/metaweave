version: "3.9"

# ---------------------------------------------------------------------------
# Shared network so all containers can resolve each other by service name.
# ---------------------------------------------------------------------------
networks:
  metaweave:
    driver: bridge

services:
  # --------------------------------------------------------------------------
  # Infrastructure
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API (also accessible from the host)
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metaweave

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"   # HTTP / Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/metaweave
    volumes:
      - neo4j_data:/data
    networks:
      - metaweave

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - metaweave

  # --------------------------------------------------------------------------
  # Backend (FastAPI)
  # --------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      # .env からシークレット（OPENAI_API_KEY 等）を読み込む。
      # ファイルが存在しない場合は docker compose が警告を出す。
      - path: .env
        required: false
    environment:
      # host-gateway により、コンテナ内の localhost が Docker ホストを指す。
      # MinIO は 9000 番でホストに公開されているため、バックエンドは
      # localhost:9000 で MinIO に到達できる。ブラウザも同じ localhost:9000 を
      # 使うため、署名に使うホスト名が統一され SignatureDoesNotMatch が起きない。
      MINIO_ENDPOINT: localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Qdrant は metaweave ネットワーク内でサービス名 "qdrant" で解決できる
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    extra_hosts:
      - "localhost:host-gateway"   # コンテナ内 localhost → Docker ホスト
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - metaweave
    restart: on-failure

  # --------------------------------------------------------------------------
  # Frontend (Streamlit)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
    ports:
      - "8501:8501"
    environment:
      # Resolved via Docker DNS inside the metaweave network.
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - metaweave
    restart: on-failure

# ---------------------------------------------------------------------------
# Persistent volumes
# ---------------------------------------------------------------------------
volumes:
  minio_data:
  neo4j_data:
  qdrant_data:
